name: Daily Lead Discovery

on:
  schedule:
    - cron: "0 0 * * *"  # runs every day at 8am Jakarta time (UTC+7 = 00:00 UTC)
  workflow_dispatch:      # allows manual trigger from GitHub UI

jobs:
  discover-leads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install firecrawl-py requests beautifulsoup4 google-api-python-client

      - name: Run lead discovery
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: |
          cd $GITHUB_WORKSPACE
          python3 main.py --discover

      - name: Commit and push new leads
        run: |
          git config user.name "Heyva Bot"
          git config user.email "bot@heyvahealth.com"
          git add leads_data/indonesia_analyzed.json leads_data/raw_leads.json leads_data/manual_leads.csv
          git diff --cached --quiet || git commit -m "chore: daily lead update $(date '+%Y-%m-%d')"
          git push
